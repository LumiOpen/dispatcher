# SLURM Configuration for AutoIF Pipeline
# This file contains SLURM-specific settings for job submission

# Global SLURM defaults
slurm:
  account: project_462000963
  output: "logs/%j.out"
  error: "logs/%j.err"

# Job type defaults
job_type_defaults:
  dispatcher_task:
    partition: dev-g
    time: "02:00:00"
    nodes: 1
    ntasks_per_node: 1
    mem: "0"
    cpus_per_task: 7
    exclusive: true
    hint: nomultithread
    gpus_per_node: "mi250:8"

  cpu_script:
    partition: debug
    time: "00:30:00"
    nodes: 1
    ntasks_per_node: 1
    mem: "32G"
    cpus_per_task: 8

# Per-job SLURM overrides
jobs:
  verifiers_generation:
    partition: dev-g
    time: "02:00:00"
    nodes: 1

  cross_validation_job:
    partition: debug
    time: "00:30:00"
    cpus_per_task: 16
    mem: "0"
