# SLURM Configuration for AutoIF Pipeline (Gemma 3 27B - TP=4)
# This file contains SLURM-specific settings for job submission

# Global SLURM defaults
slurm:
  account: project_462000963
  output: "logs/%j.out"
  error: "logs/%j.err"

# Job type defaults
job_type_defaults:
  dispatcher_task:
    partition: standard-g
    time: "03:00:00"
    nodes: 1
    ntasks_per_node: 1
    mem: "0"
    cpus_per_task: 7
    exclusive: true
    hint: nomultithread
    gpus_per_node: "mi250:4"

  cpu_script:
    partition: debug
    time: "00:30:00"
    nodes: 1
    ntasks_per_node: 1
    mem: "32G"
    cpus_per_task: 8

# Per-job SLURM overrides
jobs:
  augmentation_generation:
    time: "00:30:00"
  cross_validation_job:
    cpus_per_task: 16
    mem: "0"
