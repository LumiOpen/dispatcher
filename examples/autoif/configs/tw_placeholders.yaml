# AutoIF Pipeline Configuration - Placeholder Constraints Refactoring Test
#
# Tests the new generalized placeholder system for instruction augmentation

# ==============================================================================
# Experiment Metadata
# ==============================================================================
experiment:
  name: "tw_placeholders"
  description: "Testing placeholder-based instruction generation with Finnish"

# ==============================================================================
# vLLM Server Configuration (Interactive Mode)
# ==============================================================================
vllm_server:
  host: "127.0.0.1"
  port: 8000

# ==============================================================================
# Environment Setup
# ==============================================================================
environment_setup: "execution/environments/tw_interactive.sh"

# ==============================================================================
# Pipeline Sequence
# ==============================================================================
pipeline:
  - augmentation_preprocessing: true
  - augmentation_generation: true
  - augmentation_postprocessing: true
  - verifiers_preprocessing: true
  - verifiers_generation: true
  - cross_validation_job: true

# ==============================================================================
# Global Configuration
# ==============================================================================
model: "/shared_silo/scratch/models/Qwen3-30B-A3B"
max_model_len: 32768
tensor_parallel: 4

language: "fi"
function_timeout: 10
workers: 4
batch_size: 1

base_dir: "/shared_silo/scratch/adamhrin@amd.com/dispatcher/examples/autoif"

# ==============================================================================
# Jobs Configuration
# ==============================================================================
jobs:
  # --------------------------------------------------------------------------
  # Augmentation
  # --------------------------------------------------------------------------
  augmentation_preprocessing:
    type: cpu_script
    template: "tw_cpu_job.sh.j2"
    script: src/create_instructions_input.py
    args:
      seed-file: "${base_dir}/data/seed_instructions_fi.jsonl"
      output-file: "aug_input.jsonl"
      num-instructions-per-category: 100
      language: "${language}"

  augmentation_generation:
    type: dispatcher_task
    template: "tw_dispatcher_local.sh.j2"
    task: tasks.augmentation_task.AugmentInstructionsTask
    input_file: "aug_input.jsonl"
    output_file: "aug_output.jsonl"
    workers: 4
    work_timeout: 3600
    exports:
      HF_HUB_OFFLINE: "0"

  augmentation_postprocessing:
    type: cpu_script
    template: "tw_cpu_job.sh.j2"
    script: src/process_instructions_output.py
    args:
      input-file: "aug_output.jsonl"
      output-file: "augmented_instructions.jsonl"
      placeholder-lookup-file: "placeholder_lookup.json"
      language: "${language}"
      max-instructions: 300
      seed-file: "${base_dir}/data/seed_instructions_fi.jsonl"

  # --------------------------------------------------------------------------
  # Verifiers: Generate verification functions (old coupled approach)
  # --------------------------------------------------------------------------
  verifiers_preprocessing:
    type: cpu_script
    template: "tw_cpu_job.sh.j2"
    script: src/create_verifiers_input.py
    args:
      instructions-file: "augmented_instructions.jsonl"
      output-file: "verifiers_input.jsonl"

  verifiers_generation:
    type: dispatcher_task
    template: "tw_dispatcher_local.sh.j2"
    task: tasks.verifiers_task.GenerateVerifiersTask
    input_file: "verifiers_input.jsonl"
    output_file: "verifiers_output.jsonl"
    workers: 4
    work_timeout: 3600
    num_verifier_generations: 5
    exports:
      HF_HUB_OFFLINE: "0"

  cross_validation_job:
    type: cpu_script
    template: "tw_cpu_job.sh.j2"
    script: src/verifiers_cross_validation.py
    args:
      verifiers-file: "verifiers_output.jsonl"
      output-all-file: "verifiers_all.jsonl"
      output-filtered-file: "verifiers_filtered.jsonl"
      logfile: "crossval.log"
    exports:
      FUNCTION_TIMEOUT: "${function_timeout}"
      MIN_FUNCTIONS: 1
      MIN_TEST_CASES: 1
      FUNCTION_PASS_RATE: 0.8
      LANGUAGE: "${language}"
