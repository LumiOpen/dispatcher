# AutoIF Pipeline Configuration - Improved Test Case Generation
#
# Uses decoupled function and test case generation with user queries

# ==============================================================================
# Experiment Metadata
# ==============================================================================
experiment:
  name: "tw_gemma4"
  description: "Gemma-4-31B-IT"
  output_dir: "data/tw_gemma4"

# ==============================================================================
# vLLM Server Configuration (Interactive Mode)
# ==============================================================================
# vllm_server:  # Commented out for sbatch mode
  # host: "127.0.0.1"
  # port: 8000

# ==============================================================================
# Pipeline Sequence
# ==============================================================================
pipeline:
  - augmentation_preprocessing: false
  - augmentation_generation: false
  - augmentation_postprocessing: false
  - verifiers_preprocessing: false
  - verifiers_generation: false
  - verifiers_cross_validation: false
  - concatenation_job: false
  - response_generation: true
  - build_sft: true

# ==============================================================================
# Global Configuration
# ==============================================================================
model: "/shared_silo/scratch/models/gemma-4-31B-it"
max_model_len: 32768
tensor_parallel: 2
workers: 16
batch_size: 1
work_timeout: 3600
request_timeout: 1800
startup_timeout: 7200

base_dir: "/shared_silo/scratch/adamhrin@amd.com/dispatcher_autoif/examples/autoif"
environment_setup: "execution/environments/singularity_launcher.sh"
dispatcher_package: "/shared_silo/scratch/adamhrin@amd.com/dispatcher_autoif"
language: "fi"
hf_home: "/shared_silo/scratch/models"
function_timeout: 10

# ==============================================================================
# Jobs Configuration
# ==============================================================================
jobs:
  # --------------------------------------------------------------------------
  # Augmentation
  # --------------------------------------------------------------------------
  augmentation_preprocessing:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/create_instructions_input.py
    args:
      seed-file: "${base_dir}/data/seed_instructions_fi.jsonl"
      output-file: "aug_input.jsonl"
      num-instructions-per-category: 50
      language: "${language}"

  augmentation_generation:
    type: dispatcher_task
    template: "dispatcher_slurm.sh.j2"
    task: tasks.augmentation_task.AugmentInstructionsTask
    max_model_len: 16384
    input_file: "aug_input.jsonl"
    output_file: "aug_output.jsonl"
    vllm_extra_args: "--gpu-memory-utilization 0.85"
    exports:
      NUM_GENERATIONS: "5"

  augmentation_postprocessing:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/process_instructions_output.py
    pip_extras:
      - "'huggingface_hub<1.0'"
    args:
      input-file: "aug_output.jsonl"
      output-file: "augmented_instructions.jsonl"
      placeholder-lookup-file: "placeholder_lookup.json"
      language: "${language}"
      max-instructions: 1000
      seed-file: "${base_dir}/data/seed_instructions_fi.jsonl"
      include-seeds: false

  # --------------------------------------------------------------------------
  # Verifiers: Generate evaluation functions and test cases separately
  # --------------------------------------------------------------------------
  verifiers_preprocessing:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/create_verifiers_input.py
    args:
      instructions-file: "augmented_instructions.jsonl"
      queries-file: "${base_dir}/data/lmsys-chat-fi-500.jsonl"
      output-file: "verifiers_input.jsonl"

  verifiers_generation:
    type: dispatcher_task
    template: "dispatcher_slurm.sh.j2"
    task: tasks.verifiers_task.GenerateVerifiersTask
    input_file: "verifiers_input.jsonl"
    output_file: "verifiers_output.jsonl"
    vllm_extra_args: "--gpu-memory-utilization 0.85"
    work_timeout: 7200
    request_timeout: 3600
    max_model_len: 16384
    exports:
      NUM_FUNC_GENERATIONS: "5"
      NUM_TEST_CASES_PER_FUNC: "3"
      MIN_FUNCTIONS: "1"
      MIN_TEST_CASES: "1"
      FUNCTION_PASS_RATE: "0.5"
      TEST_PASS_RATE: "0.5"
      FUNCTION_TIMEOUT: "${function_timeout}"
      LANGUAGE: "${language}"
      SKIP_CROSS_VALIDATION: "true"

  # --------------------------------------------------------------------------
  # Cross-validation
  # --------------------------------------------------------------------------
  verifiers_cross_validation:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/verifiers_cross_validation.py
    args:
      input-file: "verifiers_output.jsonl"
      output-file: "verifiers_validated.jsonl"
    # Venv with --system-site-packages inherits the container's torch/vllm
    # and lets pip resolve transitive deps (thinc, udtools, etc.) normally.
    container: "/shared_silo/scratch/containers/vllm-openai-rocm-gemma4.sif"
    pip_extras:
      - "langid==1.1.6"
      - "sacremoses"
      - "stanza"
      - "spacy"
    exports:
      PYTHONUSERBASE: "$(pwd)/pythonuserbase_cv"
      FUNCTION_TIMEOUT: "300"
      INIT_TIMEOUT: "300"
      CASE_TIMEOUT: "30"
      MIN_FUNCTIONS: "1"
      MIN_TEST_CASES: "1"
      FUNCTION_PASS_RATE: "0.8"
      MIN_CASE_PASSES: "1"
      CROSSVAL_WORKERS: "8"
      THREADS_PER_WORKER: "2"

  # --------------------------------------------------------------------------
  # Concatenation: combine queries with verified constraints
  # --------------------------------------------------------------------------
  concatenation_job:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/concat_queries.py
    args:
      verifiers-file: "verifiers_validated.jsonl"
      queries-path: "/shared_silo/scratch/datasets/lmsys-chat-fi.jsonl"
      output-file: "queries_constraints_verifiers.jsonl"
      instructions-per-turn: "1,0.5,0.25"
      turns: 3
      num-output-lines: 700000

  # --------------------------------------------------------------------------
  # Response Generation
  # --------------------------------------------------------------------------
  response_generation:
    type: dispatcher_task
    template: "dispatcher_slurm.sh.j2"
    task: tasks.responses_task.GenerateResponsesTask
    input_file: "queries_constraints_verifiers.jsonl"
    output_file: "scored_responses.jsonl"
    vllm_extra_args: "--gpu-memory-utilization 0.85"
    work_timeout: 3600
    request_timeout: 1800
    workers: 128
    # Venv with --system-site-packages inherits container torch/vllm;
    # pip resolves transitive deps (thinc, udtools, …) normally.
    pip_extras:
      - "langid==1.1.6"
      - "sacremoses"
      - "stanza"
      - "spacy"
    exports:
      LANGUAGE: "${language}"
      SCORE_THRESHOLD: "4"
      PLACEHOLDER_LOOKUP_FILE: "placeholder_lookup.json"
      MAX_RETRIES: "5"
      EVAL_WORKERS: "8"
      PREIMPORT_MODULES: "stanza,spacy"
      INIT_TIMEOUT: "300"
      CASE_TIMEOUT: "30"

  # --------------------------------------------------------------------------
  # SFT Dataset Build
  # --------------------------------------------------------------------------
  build_sft:
    type: cpu_script
    template: "cpu_slurm.sh.j2"
    script: src/build_sft.py
    args:
      input-file: "scored_responses.jsonl"
      output-dir: "sft_longest_chats.split"
      train-size: 30000
      test-size: 150
