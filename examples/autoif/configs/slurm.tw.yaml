# SLURM Configuration for AutoIF Pipeline - TensorWave
# TensorWave has only GPU partition, CPU jobs use --gpus=0

# Global SLURM defaults
slurm:
  partition: amd-tw-verification
  output: "logs/%j.out"
  error: "logs/%j.err"

# Job type defaults
job_type_defaults:
  dispatcher_task:
    nodes: 1
    ntasks_per_node: 1
    mem: "0"
    gpus_per_node: 2
    exclusive: user
    hint: nomultithread
    time: "04:00:00"

  cpu_script:
    # Use same GPU partition but with --gpus=0 (set in template)
    partition: amd-tw-verification
    nodes: 1
    ntasks_per_node: 1
    mem: "64G"
    cpus_per_task: 8
    time: "00:30:00"

# Per-job SLURM overrides (SLURM settings only)
jobs:
  verifiers_generation:
    ntasks_per_node: 2
    gpus_per_node: 8
    time: "10:00:00"

  concatenation_job:
    mem: "128G"
    time: "00:30:00"

  response_generation:
    nodes: 2
    ntasks_per_node: 4
    gpus_per_node: 8
    time: "48:00:00"
    